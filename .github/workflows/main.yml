name: AcherLab RDP

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Chon mat khau truy cap RDP'
        required: true
        default: 'cocaicc1A@@'
        type: choice
        options:
          - 'cocaicc1A@@'
          - 'P@ssw0rd!AcherLab2026'

jobs:
  RDP-Setup:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: BANNER HERO
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║               ACHERLAB RDP PREMIUM - LINUX MINT EDITION      ║" -ForegroundColor Cyan
          Write-Host "╠══════════════════════════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║  OS Target : Windows Latest                                  ║" -ForegroundColor White
          Write-Host "║  Client OS : Linux Mint (Cinnamon / MATE / XFCE)             ║" -ForegroundColor Yellow
          Write-Host "╚══════════════════════════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""

      - name: CAU HINH RDP SYSTEM
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="AcherLab-RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

      - name: TAO TAI KHOAN ADMIN
        env:
          INPUT_PASS: ${{ github.event.inputs.password }}
        run: |
          $rawPass = $env:INPUT_PASS
          "RDP_PASS=$rawPass" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          $pass = ConvertTo-SecureString $rawPass -AsPlainText -Force
          try {
            New-LocalUser -Name "AcherLab" -Password $pass -AccountNeverExpires -PasswordNeverExpires -ErrorAction Stop
          } catch {
            Write-Host "Password policy fail, generate auto..." -ForegroundColor Yellow
            $special = [char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126)
            $p = "AcherLab@" + (-join (1..4 | %{ -join ((48..57) | Get-Random -Count 3 | %{[char]$_}) })) + (-join ($special | Get-Random -Count 2 | %{[char]$_}))
            $newPass = ConvertTo-SecureString $p -AsPlainText -Force
            New-LocalUser -Name "AcherLab" -Password $newPass -AccountNeverExpires -PasswordNeverExpires
            "RDP_PASS=$p" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
            Write-Host "Password auto-generated: $p" -ForegroundColor Green
          }
          Add-LocalGroupMember -Group "Administrators" -Member "AcherLab"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "AcherLab"
          Enable-LocalUser -Name "AcherLab"
          "RDP_USER=AcherLab" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: CAI DAT OPENSSH
        run: |
          Write-Host "Cai OpenSSH Client..." -ForegroundColor Yellow
          Add-WindowsCapability -Online -Name "OpenSSH.Client*" -ErrorAction SilentlyContinue
          Write-Host "OpenSSH da san sang!" -ForegroundColor Green

      - name: 🌐 THIET LAP TUNNEL (PINGGY + BORE FALLBACK)
        run: |
          Write-Host "Khoi tao Pinggy Tunnel (TCP Port 3389)..." -ForegroundColor Yellow
          $pinggyJob = Start-Job -ScriptBlock {
              ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=NUL -o BatchMode=yes -o ServerAliveInterval=30 -p 443 -R0:localhost:3389 a.pinggy.io 2>&1 | Out-File "$env:TEMP\pinggy.log" -Force
          }
          Start-Sleep -Seconds 20
          $output = if (Test-Path "$env:TEMP\pinggy.log") { Get-Content "$env:TEMP\pinggy.log" -Raw } else { "" }
          Write-Host "Pinggy Raw Output: $output"
          
          $tunnelUrl = $null
          if ($output) {
              $match = [regex]::Match($output, '([a-zA-Z0-9-]+\.pinggy(?:\.(?:io|link|net))+(?::\d+)?)')
              if (-not $match.Success) {
                  $match = [regex]::Match($output, '(?:tcp://)?([a-zA-Z0-9-]+(?:\.[a-zA-Z0-9-]+)+):(\d+)')
              }
              if ($match.Success) {
                  $tunnelUrl = $match.Value
                  if ($tunnelUrl -notmatch ':\d+
) {
                      $tunnelUrl = "$tunnelUrl:443"
                  }
              }
          }

          if (-not $tunnelUrl) {
              Write-Host "Pinggy fail! Fallback sang Bore Tunnel..." -ForegroundColor Yellow
              $pinggyJob | Stop-Job 2>$null
              Remove-Job $pinggyJob -Force 2>$null
              
              $url = "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip"
              $zip = "$env:TEMP\bore.zip"
              Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
              Expand-Archive -Path $zip -DestinationPath "$env:TEMP\bore" -Force
              
              $boreJob = Start-Job -ScriptBlock {
                  param($borePath)
                  & $borePath local 3389 --to bore.pub 2>&1 | Out-File "$env:TEMP\bore.log" -Force
              } -ArgumentList "$env:TEMP\bore\bore.exe"
              
              Start-Sleep -Seconds 10
              $boreOutput = if (Test-Path "$env:TEMP\bore.log") { Get-Content "$env:TEMP\bore.log" -Raw } else { "" }
              Write-Host "Bore Output: $boreOutput"
              $boreMatch = [regex]::Match($boreOutput, 'listening on.*?:(\d+)')
              if (-not $boreMatch.Success) { $boreMatch = [regex]::Match($boreOutput, 'accepted.*?:(\d+)') }
              if (-not $boreMatch.Success) { $boreMatch = [regex]::Match($boreOutput, '(\d{4,5})') }
              $borePort = if ($boreMatch.Success) { $boreMatch.Groups[1].Value } else { "3389" }
              $tunnelUrl = "bore.pub:$borePort"
          }

          "TUNNEL_URL=$tunnelUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "SUCCESS! Tunnel active: $tunnelUrl" -ForegroundColor Green

      - name: 💻 THONG TIN KET NOI (DAP UNG LINUX MINT)
        run: |
          $url = $env:TUNNEL_URL
          $user = $env:RDP_USER
          $pass = $env:RDP_PASS

          Write-Host ""
          Write-Host "=================================================================" -ForegroundColor Cyan
          Write-Host "             🎯 ACHERLAB RDP CONNECT INFO FOR LINUX MINT       " -ForegroundColor Cyan
          Write-Host "=================================================================" -ForegroundColor Cyan
          Write-Host "  RDP Address : $url" -ForegroundColor Yellow
          Write-Host "  Username    : $user" -ForegroundColor White
          Write-Host "  Password    : $pass" -ForegroundColor White
          Write-Host "=================================================================" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "📌 PHUONG AN 1: DUNG REMMINA GUI (MAC DINH LINUX MINT - KHUYEN DUNG)" -ForegroundColor Green
          Write-Host "   1. Mo Remmina tu Menu Linux Mint" -ForegroundColor White
          Write-Host "   2. Chon giao thuc RDP" -ForegroundColor White
          Write-Host "   3. Nhap Server: $url" -ForegroundColor White
          Write-Host "   4. Username: $user | Password: $pass" -ForegroundColor White
          Write-Host "   5. Trong cai dat Remmina: Dat 'Color depth' = True color (32 bpp), 'Quality' = Best" -ForegroundColor White
          Write-Host ""
          Write-Host "📌 PHUONG AN 2: LENG XFREERDP FAST COMMAND (PASTE VAO TERMINAL MINT)" -ForegroundColor Green
          Write-Host "   xfreerdp /v:$url /u:$user /p:'$pass' /cert-ignore /dynamic-resolution /gfx:avc444 +clipboard +fonts +aero /sound:sys:alsa /network:lan" -ForegroundColor BrightYellow
          Write-Host ""
          Write-Host "=================================================================" -ForegroundColor Cyan

      - name: ⏳ DUY TRI PHIEN LAM VIEC
        run: |
          $end = (Get-Date).AddMinutes(340)
          do {
            $r = $end - (Get-Date)
            $h = [math]::Max(0, [math]::Floor($r.TotalHours))
            $m = [math]::Max(0, [math]::Floor($r.TotalMinutes % 60))
            $s = [math]::Max(0, [math]::Floor($r.TotalSeconds % 60))
            Write-Host "`rCon lai: $h gio $m phut $s giay" -NoNewline -ForegroundColor Cyan
            Start-Sleep -Seconds 5
          } while ($r.TotalSeconds -gt 0)
