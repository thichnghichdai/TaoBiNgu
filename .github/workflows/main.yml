name: AcherLab RDP

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Chon mat khau'
        required: true
        default: 'cocaicc1A@@'
        type: choice
        options:
        - 'cocaicc1A@@'
        - 'P@ssw0rd!AcherLab2026'

jobs:
  RDP-Setup:
    strategy:
      matrix:
        os:
          - windows-latest
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360

    steps:
      - name: BANNER
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║          ACHERLAB RDP PREMIUM           ║" -ForegroundColor Cyan
          Write-Host "╠══════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║  Runner: ${{ matrix.os }}" -ForegroundColor White
          Write-Host "╚══════════════════════════════════════════╝" -ForegroundColor Cyan

      - name: CAU HINH RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="AcherLab-RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

      - name: TAO TAI KHOAN
        run: |
          $rawPass = "${{ github.event.inputs.password }}"
          $pass = ConvertTo-SecureString $rawPass -AsPlainText -Force
          $finalPass = $rawPass
          try {
            New-LocalUser -Name "AcherLab" -Password $pass -AccountNeverExpires -PasswordNeverExpires -ErrorAction Stop
          } catch {
            Write-Host "Password policy fail, generate auto..." -ForegroundColor Yellow
            $special = [char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126)
            $finalPass = "AcherLab@" + (-join (1..4 | %{ -join ((48..57) | Get-Random -Count 3 | %{[char]$_}) })) + (-join ($special | Get-Random -Count 2 | %{[char]$_}))
            $newPass = ConvertTo-SecureString $finalPass -AsPlainText -Force
            New-LocalUser -Name "AcherLab" -Password $newPass -AccountNeverExpires -PasswordNeverExpires
            Write-Host "Password auto-generated: $finalPass" -ForegroundColor Green
          }
          Add-LocalGroupMember -Group "Administrators" -Member "AcherLab"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "AcherLab"
          Enable-LocalUser -Name "AcherLab"
          
          "RDP_USER=AcherLab" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RDP_PASS=$finalPass" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: CAI DAT OPENSSH
        run: |
          Write-Host "Cai OpenSSH cho Pinggy tunnel..." -ForegroundColor Yellow
          Add-WindowsCapability -Online -Name "OpenSSH.Client*" -ErrorAction SilentlyContinue
          Write-Host "OpenSSH da san sang!" -ForegroundColor Green

      - name: PINGGY TUNNEL TCP 3389
        run: |
          Write-Host "Cai dat Pinggy tunnel (raw TCP)..." -ForegroundColor Yellow
          $logPath = "$env:TEMP\pinggy.log"
          
          $pinggyJob = Start-Job -ScriptBlock {
              param($log)
              ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=NUL -o ServerAliveInterval=30 -N -T -p 443 -R0:localhost:3389 tcp@a.pinggy.io 2>&1 | Out-File $log -Encoding utf8 -Force
          } -ArgumentList $logPath
          
          Write-Host "Doi Pinggy tunnel 15s..." -ForegroundColor Yellow
          Start-Sleep -Seconds 15
          
          $output = if (Test-Path $logPath) { Get-Content $logPath -Raw -ErrorAction SilentlyContinue } else { "" }
          Write-Host "Pinggy output log: $output"
          
          $tunnelUrl = $null
          if ($output) {
              if ($output -match '([a-zA-Z0-9-]+\.pinggy\.(?:io|link|net):\d+)') {
                  $tunnelUrl = $matches[1]
              } elseif ($output -match 'tcp://([a-zA-Z0-9-.]+\:\d+)') {
                  $tunnelUrl = $matches[1]
              }
          }
          
          if ($tunnelUrl) {
              "TUNNEL_URL=$tunnelUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              Write-Host "Pinggy tunnel: $tunnelUrl" -ForegroundColor Green
          } else {
              Write-Host "Pinggy fail, fallback sang bore..." -ForegroundColor Yellow
              Stop-Job $pinggyJob -ErrorAction SilentlyContinue
              Remove-Job $pinggyJob -Force -ErrorAction SilentlyContinue
              
              $url = "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip"
              $zip = "$env:TEMP\bore.zip"
              Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
              Expand-Archive -Path $zip -DestinationPath "$env:TEMP\bore" -Force
              
              $boreLog = "$env:TEMP\bore.log"
              $boreJob = Start-Job -ScriptBlock {
                  param($borePath, $log)
                  & $borePath local 3389 --to bore.pub 2>&1 | Out-File $log -Encoding utf8 -Force
              } -ArgumentList "$env:TEMP\bore\bore.exe", $boreLog
              
              Start-Sleep -Seconds 10
              $boreOutput = if (Test-Path $boreLog) { Get-Content $boreLog -Raw -ErrorAction SilentlyContinue } else { "" }
              Write-Host "Bore output: $boreOutput"
              
              $borePort = "3389"
              if ($boreOutput -match 'bore\.pub:(\d+)') {
                  $borePort = $matches[1]
              } elseif ($boreOutput -match 'port (\d+)') {
                  $borePort = $matches[1]
              }
              
              $tunnelUrl = "bore.pub:$borePort"
              "TUNNEL_URL=$tunnelUrl" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
              Write-Host "Bore tunnel: $tunnelUrl" -ForegroundColor Green
          }

      - name: THONG TIN KET NOI
        run: |
          $urlToShow = if ($env:TUNNEL_URL) { $env:TUNNEL_URL } else { "bore.pub (xem log de lay port)" }
          $userToShow = if ($env:RDP_USER) { $env:RDP_USER } else { "AcherLab" }
          $passToShow = if ($env:RDP_PASS) { $env:RDP_PASS } else { "${{ github.event.inputs.password }}" }
          
          Write-Host ""
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host "  ACHERLAB RDP READY" -ForegroundColor Cyan
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host "  Runner: ${{ matrix.os }}" -ForegroundColor White
          Write-Host "  User:   $userToShow" -ForegroundColor White
          Write-Host "  Pass:   $passToShow" -ForegroundColor White
          Write-Host "  Tunnel: $urlToShow" -ForegroundColor Green
          Write-Host "============================================" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "Linux (xfreerdp): xfreerdp /v:$urlToShow /u:$userToShow /p:'$passToShow' /cert-ignore /size:1920x1080 /dynamic-resolution +clipboard +fonts +aero /gdi:hw" -ForegroundColor Yellow

      - name: DUY TRI PHIEN
        run: |
          $end = (Get-Date).AddMinutes(340)
          do {
            $r = $end - (Get-Date)
            $h = [math]::Max(0, [math]::Floor($r.TotalHours))
            $m = [math]::Max(0, [math]::Floor($r.TotalMinutes % 60))
            $s = [math]::Max(0, [math]::Floor($r.TotalSeconds % 60))
            Write-Host "`rCon lai: $h gio $m phut $s giay" -NoNewline -ForegroundColor Cyan
            Start-Sleep -Seconds 5
          } while ($r.TotalSeconds -gt 0)
