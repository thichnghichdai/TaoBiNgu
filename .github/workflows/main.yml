name: Windows Integration Testing
on:
  workflow_dispatch:

jobs:
  build-test:
    runs-on: windows-latest
    timeout-minutes: 3600

    steps:
      - name: Initialize environment
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
                             -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
                             -Name "SecurityLayer" -Value 0 -Force

      - name: Configure network dependencies
        run: |
          netsh advfirewall firewall delete rule name="RDP-Service" 2> $null
          netsh advfirewall firewall add rule name="RDP-Service" `
            dir=in action=allow protocol=TCP localport=3389

      - name: Create service account
        run: |
          if (Get-LocalUser -Name "svc_admin" -ErrorAction SilentlyContinue) {
              Remove-LocalUser -Name "svc_admin" -Force
          }

          $rng = [System.Security.Cryptography.RandomNumberGenerator]::Create()
          $bytes = New-Object byte[] 16
          $rng.GetBytes($bytes)
          $chars = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()-_=+[]{}|;:,.<>?"
          $password = -join (0..15 | ForEach-Object { $chars[$bytes[$_] % $chars.Length] })
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force

          New-LocalUser -Name "svc_admin" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "svc_admin"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "svc_admin"

          "SVC_USER=svc_admin" | Out-File -FilePath $env:GITHUB_ENV -Append
          "SVC_PASS=$password" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install toolchain
        run: |
          Add-WindowsCapability -Online -Name "OpenSSH.Client*" -ErrorAction SilentlyContinue
          Restart-Service -Name TermService -Force

      - name: Establish tunnel (cloudflared primary, bore fallback)
        run: |
          Write-Host "=== Trying Cloudflare Tunnel (cloudflared) ==="
          $cfUrl = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          $cfExe = "$env:TEMP\cloudflared.exe"
          
          try {
              Invoke-WebRequest -Uri $cfUrl -OutFile $cfExe -UseBasicParsing
              
              $job = Start-Job -ScriptBlock {
                  param($exe)
                  & $exe tunnel --url tcp://localhost:3389 2>&1
              } -ArgumentList $cfExe
              
              Start-Sleep -Seconds 10
              $output = Receive-Job -Job $job -ErrorAction SilentlyContinue
              Write-Host "cloudflared output: $output"
              
              if ($output -match 'https://[a-z0-9-]+\.trycloudflare\.com') {
                  $tunnelUrl = $Matches[0]
                  $tunnelHost = $tunnelUrl -replace 'https://', ''
                  Write-Host "::notice title=Tunnel URL::$tunnelHost:443 (cloudflared)"
                  "TUNNEL_URL=$tunnelHost:443" | Out-File -FilePath $env:GITHUB_ENV -Append
                  "TUNNEL_TYPE=cloudflared" | Out-File -FilePath $env:GITHUB_ENV -Append
                  $job | Stop-Job
                  return
              }
              $job | Stop-Job
          } catch {
              Write-Warning "cloudflared failed: $_"
          }

          Write-Host "=== Fallback: Trying bore.pub ==="
          $boreUrls = @(
              "https://github.com/ekzhang/bore/releases/latest/download/bore-x86_64-pc-windows-msvc.zip",
              "https://github.com/ekzhang/bore/releases/latest/download/bore-x86_64-windows.zip",
              "https://github.com/ekzhang/bore/releases/download/v0.6.0/bore-x86_64-pc-windows-msvc.zip"
          )
          
          $boreExe = $null
          foreach ($url in $boreUrls) {
              try {
                  $zipPath = "$env:TEMP\bore.zip"
                  Write-Host "Trying: $url"
                  Invoke-WebRequest -Uri $url -OutFile $zipPath -UseBasicParsing -ErrorAction Stop
                  Expand-Archive -Path $zipPath -DestinationPath "$env:TEMP\bore" -Force
                  $boreExe = "$env:TEMP\bore\bore.exe"
                  if (Test-Path $boreExe) { break }
              } catch {
                  Write-Warning "Failed: $url - $_"
              }
          }
          
          if (-not $boreExe -or -not (Test-Path $boreExe)) {
              Write-Error "All bore downloads failed"
              exit 1
          }

          Write-Host "Starting bore tunnel on port 3389..."
          $job = Start-Job -ScriptBlock {
              param($exe)
              & $exe local 3389 --to bore.pub 2>&1
          } -ArgumentList $boreExe
          
          Start-Sleep -Seconds 10
          $output = Receive-Job -Job $job -ErrorAction SilentlyContinue
          Write-Host "bore output: $output"
          
          if ($output -match 'accepted.*?:(\d+)') {
              $tunnelPort = $Matches[1]
          } elseif ($output -match 'listening on.*?:(\d+)') {
              $tunnelPort = $Matches[1]
          } else {
              $tunnelPort = 3389
          }
          $tunnelUrl = "bore.pub:$tunnelPort"
          Write-Host "::notice title=Tunnel URL::$tunnelUrl"
          "TUNNEL_URL=$tunnelUrl" | Out-File -FilePath $env:GITHUB_ENV -Append
          "TUNNEL_TYPE=bore" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Verify service connectivity
        run: |
          Clear-Host
          Write-Host "============================================"
          Write-Host "  CONNECTION DETAILS"
          Write-Host "============================================"
          Write-Host "  Tunnel  : $env:TUNNEL_TYPE"
          Write-Host "  Address : $env:TUNNEL_URL"
          Write-Host "  User    : $env:SVC_USER"
          Write-Host "  Pass    : $env:SVC_PASS"
          Write-Host "============================================"
          Write-Host "  Linux Mint connect (xfreerdp):"
          Write-Host "============================================"
          Write-Host "  xfreerdp /v:$env:TUNNEL_URL /u:$env:SVC_USER /p:'$env:SVC_PASS' /cert-ignore /size:1920x1080 /dynamic-resolution +clipboard +fonts +aero /gdi:hw"
          Write-Host "============================================"
          Test-NetConnection -ComputerName localhost -Port 3389 -WarningAction SilentlyContinue

      - name: Keep-alive
        run: |
          $counter = 0
          while ($true) {
              $counter++
              Write-Host "[$(Get-Date)] CI healthcheck #$counter | Status: OK"
              Start-Sleep -Seconds 300
          }
