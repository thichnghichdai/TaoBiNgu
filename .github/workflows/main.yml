name: AcherLab RDP

on:
  workflow_dispatch:
    inputs:
      password:
        description: 'Chon mat khau'
        required: true
        default: 'cocaicc1A@@'
        type: choice
        options:
        - 'cocaicc1A@@'
        - 'P@ssw0rd!AcherLab2026'

jobs:
  RDP-Setup:
    strategy:
      matrix:
        os:
          - windows-latest
          - windows-2022
      fail-fast: false
    runs-on: ${{ matrix.os }}
    timeout-minutes: 360

    steps:
      - name: BANNER
        run: |
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║          ACHERLAB RDP PREMIUM           ║" -ForegroundColor Cyan
          Write-Host "╠══════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║  Runner: ${{ matrix.os }}" -ForegroundColor White
          Write-Host "╚══════════════════════════════════════════╝" -ForegroundColor Cyan

      - name: CAU HINH RDP
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          netsh advfirewall firewall add rule name="AcherLab-RDP" dir=in action=allow protocol=TCP localport=3389 profile=any
          Set-Service -Name TermService -StartupType Automatic
          Start-Service -Name TermService

      - name: TAO TAI KHOAN
        run: |
          $rawPass = "${{ github.event.inputs.password }}"
          echo "RDP_PASS=$rawPass" >> $env:GITHUB_ENV
          $pass = ConvertTo-SecureString $rawPass -AsPlainText -Force
          try {
            New-LocalUser -Name "AcherLab" -Password $pass -AccountNeverExpires -PasswordNeverExpires -ErrorAction Stop
          } catch {
            Write-Host "⚠️ Password policy fail, thu password manual..."
            # Tu dong generate password dam bao complexity
            $special = [char[]](33..47) + [char[]](58..64) + [char[]](91..96) + [char[]](123..126)
            $p = "AcherLab@" + (-join (1..4 | %{ -join ((48..57) | Get-Random -Count 3 | %{[char]$_}) })) + (-join ($special | Get-Random -Count 2 | %{[char]$_}))
            $newPass = ConvertTo-SecureString $p -AsPlainText -Force
            New-LocalUser -Name "AcherLab" -Password $newPass -AccountNeverExpires -PasswordNeverExpires
            echo "RDP_PASS=$p" >> $env:GITHUB_ENV
            Write-Host "✅ Password auto-generated: $p"
          }
          Add-LocalGroupMember -Group "Administrators" -Member "AcherLab"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "AcherLab"
          Enable-LocalUser -Name "AcherLab"
          echo "RDP_USER=AcherLab" >> $env:GITHUB_ENV

      - name: CLOUDFLARED TUNNEL TCP 3389
        run: |
          Write-Host "🌐 Cai dat Cloudflare Tunnel..." -ForegroundColor Yellow
          $cfUrl = "https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-windows-amd64.exe"
          $cfExe = "$env:TEMP\cloudflared.exe"
          Invoke-WebRequest -Uri $cfUrl -OutFile $cfExe -UseBasicParsing
          Write-Host "✅ Da tai cloudflared!" -ForegroundColor Green

          # Start cloudflared background job - KO redirect file
          $global:tunnelJob = Start-Job -ScriptBlock {
              param($exe)
              & $exe tunnel --url tcp://localhost:3389 2>&1
          } -ArgumentList $cfExe

          Write-Host "⏳ Đợi tunnel khởi tạo 15s..." -ForegroundColor Yellow
          Start-Sleep -Seconds 15

          # Doc output, dung -Keep de job van song
          $output = Receive-Job -Job $global:tunnelJob -Keep -ErrorAction SilentlyContinue
          Write-Host "Raw output: $output"

          $tunnelUrl = $null
          $match = [regex]::Match($output, 'https://([a-z0-9-]+\.trycloudflare\.com)')
          if ($match.Success) {
              $tunnelUrl = $match.Groups[1].Value
              "TUNNEL_URL=$tunnelUrl`:443" | Out-File -FilePath $env:GITHUB_ENV -Append
          }

          if ($tunnelUrl) {
              Write-Host "✅ Cloudflare Tunnel: $tunnelUrl:443" -ForegroundColor Green
          } else {
              Write-Host "⏳ Chua co URL, cho them 10s..." -ForegroundColor Yellow
              Start-Sleep -Seconds 10
              $output = Receive-Job -Job $global:tunnelJob -Keep -ErrorAction SilentlyContinue
              $match = [regex]::Match($output, 'https://([a-z0-9-]+\.trycloudflare\.com)')
              if ($match.Success) {
                  $tunnelUrl = $match.Groups[1].Value
                  "TUNNEL_URL=$tunnelUrl`:443" | Out-File -FilePath $env:GITHUB_ENV -Append
                  Write-Host "✅ Cloudflare Tunnel: $tunnelUrl:443" -ForegroundColor Green
              } else {
                  Write-Host "⚠️ Fallback sang bore..." -ForegroundColor Yellow
                  $global:tunnelJob | Stop-Job 2>$null
                  Remove-Job $global:tunnelJob -Force 2>$null
                  $url = "https://github.com/ekzhang/bore/releases/download/v0.5.2/bore-v0.5.2-x86_64-pc-windows-msvc.zip"
                  $zip = "$env:TEMP\bore.zip"
                  Invoke-WebRequest -Uri $url -OutFile $zip
                  Expand-Archive -Path $zip -DestinationPath "$env:TEMP\bore" -Force
                  Start-Process -NoNewWindow -FilePath "$env:TEMP\bore\bore.exe" -ArgumentList "local", "3389", "--to", "bore.pub"
                  Write-Host "✅ Bore da chay!" -ForegroundColor Green
              }
          }

      - name: THONG TIN KET NOI
        run: |
          $urlToShow = if ($env:TUNNEL_URL) { $env:TUNNEL_URL } else { "bore.pub (xem log de lay port)" }
          Write-Host ""
          Write-Host "╔══════════════════════════════════════════════════╗" -ForegroundColor Cyan
          Write-Host "║              ACHERLAB RDP READY                ║" -ForegroundColor Cyan
          Write-Host "╠══════════════════════════════════════════════════╣" -ForegroundColor Cyan
          Write-Host "║  Runner: ${{ matrix.os }}" -ForegroundColor White
          Write-Host "║  User:   AcherLab" -ForegroundColor White
          Write-Host "║  Pass:   ${{ github.event.inputs.password }}" -ForegroundColor White
          Write-Host "║  Tunnel: $urlToShow" -ForegroundColor Green
          Write-Host "╚══════════════════════════════════════════╝" -ForegroundColor Cyan
          Write-Host ""
          Write-Host "📌 User: AcherLab | Pass: ${{ github.event.inputs.password }} | Tunnel: $urlToShow" -ForegroundColor Yellow
          Write-Host "📌 Linux (xfreerdp): xfreerdp /v:$urlToShow /u:AcherLab /p:'${{ github.event.inputs.password }}' /cert-ignore /size:1920x1080 /dynamic-resolution +clipboard +fonts +aero /gdi:hw" -ForegroundColor Yellow

      - name: DUY TRI PHIEN
        run: |
          $end = (Get-Date).AddMinutes(340)
          do {
            $r = $end - (Get-Date)
            $h = [math]::Max(0, [math]::Floor($r.TotalHours))
            $m = [math]::Max(0, [math]::Floor($r.TotalMinutes % 60))
            $s = [math]::Max(0, [math]::Floor($r.TotalSeconds % 60))
            Write-Host "`r⏳ Con lai: $h gio $m phut $s giay" -NoNewline -ForegroundColor Cyan
            Start-Sleep -Seconds 5
          } while ($r.TotalSeconds -gt 0)
